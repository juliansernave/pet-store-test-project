name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Review this pull request. Follow the conventions in CLAUDE.md:
            - Specs must import from lib/, never from @playwright/test directly
            - Paths must come from routes.ts, never written inline
            - Payloads must use builders from lib/data/ (buildPet, buildOrder, buildUser)
            - Happy-path tests must call shouldMatchSchema before field assertions
            - Multi-test files need one test.describe block; single-test files skip it
            - New tests should have an appropriate @smoke or @flaky tag

            Post your findings as inline PR review comments on the relevant lines.
            Summarize overall quality in the top-level review comment.

